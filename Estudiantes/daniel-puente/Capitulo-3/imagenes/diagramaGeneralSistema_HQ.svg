<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama general del sistema - Restaurante La Union</title>
  <desc id="desc">Arquitectura general con frontend PWA, backend Express, Socket.IO, soporte offline con IndexedDB y MongoDB Atlas.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#30343b"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c5f88"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e6b45"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #1d1d1f; }
      .section-title { font: 700 20px Arial, sans-serif; fill: #1d1d1f; }
      .sub-title { font: 700 17px Arial, sans-serif; fill: #262a2f; }
      .label { font: 15px Arial, sans-serif; fill: #222; }
      .small { font: 13px Arial, sans-serif; fill: #333; }
      .tiny { font: 12px Arial, sans-serif; fill: #333; }
      .box { fill: #ffffff; stroke: #737373; stroke-width: 1.5; rx: 7; }
      .outer-yellow { fill: #fff8df; stroke: #8f7d46; stroke-width: 2; rx: 10; }
      .outer-red { fill: #ffe8e8; stroke: #a06969; stroke-width: 2; rx: 10; }
      .outer-blue { fill: #e8f4ff; stroke: #5b82a0; stroke-width: 2; rx: 10; }
      .outer-green { fill: #e8f7e9; stroke: #5f8d62; stroke-width: 2; rx: 10; }
      .outer-gray { fill: #f6f6f6; stroke: #727272; stroke-width: 2; rx: 10; }
      .line { fill: none; stroke: #30343b; stroke-width: 2.2; marker-end: url(#arrow); }
      .line-blue { fill: none; stroke: #2c5f88; stroke-width: 2.2; marker-end: url(#arrowBlue); }
      .line-green { fill: none; stroke: #2e6b45; stroke-width: 2.2; marker-end: url(#arrowGreen); }
      .dash { stroke-dasharray: 8 7; }
    </style>
  </defs>

  <rect width="1800" height="1100" fill="#ffffff"/>
  <text x="900" y="58" text-anchor="middle" class="title">Diagrama general del sistema</text>
  <text x="900" y="88" text-anchor="middle" class="label">Sistema de gestion interna del Restaurante La Union</text>

  <!-- Tiempo real -->
  <rect x="70" y="130" width="430" height="330" class="outer-yellow"/>
  <text x="92" y="163" class="section-title">Tiempo real (Socket.IO)</text>
  <rect x="100" y="190" width="370" height="235" class="box" fill="#fffaf0"/>
  <text x="285" y="223" text-anchor="middle" class="sub-title">Eventos WebSocket</text>
  <rect x="132" y="264" width="160" height="38" class="box"/>
  <text x="212" y="288" text-anchor="middle" class="small">notificacion:platosListos</text>
  <rect x="310" y="264" width="130" height="38" class="box"/>
  <text x="375" y="288" text-anchor="middle" class="small">kds:actualizado</text>
  <rect x="132" y="365" width="308" height="38" class="box"/>
  <text x="286" y="389" text-anchor="middle" class="small">notificacion:reservaProximaMesaOcupada</text>

  <!-- Offline -->
  <rect x="570" y="130" width="470" height="190" class="outer-red"/>
  <text x="592" y="163" class="section-title">Soporte offline (Service Worker)</text>
  <rect x="605" y="195" width="400" height="82" class="box"/>
  <text x="805" y="225" text-anchor="middle" class="sub-title">IndexedDB + Background Sync</text>
  <rect x="640" y="244" width="160" height="38" class="box"/>
  <text x="720" y="268" text-anchor="middle" class="small">Operaciones pendientes</text>
  <rect x="820" y="244" width="150" height="38" class="box"/>
  <text x="895" y="268" text-anchor="middle" class="small">Sincronizacion automatica</text>

  <!-- Frontend -->
  <rect x="1135" y="260" width="530" height="360" class="outer-blue"/>
  <text x="1158" y="293" class="section-title">Frontend - tablets del restaurante</text>
  <rect x="1170" y="325" width="240" height="255" class="box"/>
  <text x="1290" y="358" text-anchor="middle" class="sub-title">Camarero / Administrador</text>
  <text x="1290" y="382" text-anchor="middle" class="small">(PWA - React + TypeScript)</text>
  <rect x="1205" y="430" width="90" height="38" class="box"/>
  <text x="1250" y="454" text-anchor="middle" class="small">SalaView</text>
  <rect x="1310" y="430" width="90" height="38" class="box"/>
  <text x="1355" y="454" text-anchor="middle" class="small">ComandaView</text>
  <rect x="1205" y="535" width="90" height="38" class="box"/>
  <text x="1250" y="559" text-anchor="middle" class="small">CajaView</text>
  <rect x="1445" y="325" width="175" height="140" class="box"/>
  <text x="1532" y="358" text-anchor="middle" class="sub-title">Cocinero</text>
  <text x="1532" y="382" text-anchor="middle" class="small">(PWA - React + TypeScript)</text>
  <rect x="1490" y="430" width="85" height="38" class="box"/>
  <text x="1532" y="454" text-anchor="middle" class="small">KDSView</text>

  <!-- Backend -->
  <rect x="70" y="760" width="1260" height="270" class="outer-green"/>
  <text x="95" y="793" class="section-title">Backend API (Express + JavaScript)</text>
  <rect x="100" y="825" width="170" height="175" class="box"/>
  <text x="185" y="856" text-anchor="middle" class="sub-title">Middleware</text>
  <rect x="125" y="890" width="64" height="36" class="box"/>
  <text x="157" y="913" text-anchor="middle" class="tiny">JWT Auth</text>
  <rect x="198" y="890" width="60" height="36" class="box"/>
  <text x="228" y="913" text-anchor="middle" class="tiny">Role Guard</text>
  <rect x="126" y="960" width="105" height="36" class="box"/>
  <text x="178" y="983" text-anchor="middle" class="tiny">Error Handler</text>

  <rect x="305" y="825" width="430" height="175" class="box"/>
  <text x="520" y="856" text-anchor="middle" class="sub-title">Controladores</text>
  <rect x="335" y="890" width="110" height="36" class="box"/>
  <text x="390" y="913" text-anchor="middle" class="tiny">AuthController</text>
  <rect x="460" y="890" width="110" height="36" class="box"/>
  <text x="515" y="913" text-anchor="middle" class="tiny">MesaController</text>
  <rect x="585" y="890" width="130" height="36" class="box"/>
  <text x="650" y="913" text-anchor="middle" class="tiny">ComandaController</text>
  <rect x="335" y="960" width="105" height="36" class="box"/>
  <text x="387" y="983" text-anchor="middle" class="tiny">KDSController</text>
  <rect x="455" y="960" width="125" height="36" class="box"/>
  <text x="517" y="983" text-anchor="middle" class="tiny">ReservaController</text>
  <rect x="595" y="960" width="115" height="36" class="box"/>
  <text x="652" y="983" text-anchor="middle" class="tiny">TicketController</text>

  <rect x="770" y="825" width="520" height="175" class="box"/>
  <text x="1030" y="856" text-anchor="middle" class="sub-title">Modelos Mongoose</text>
  <rect x="800" y="890" width="120" height="36" class="box"/>
  <text x="860" y="913" text-anchor="middle" class="tiny">Usuario - Zona</text>
  <rect x="935" y="890" width="120" height="36" class="box"/>
  <text x="995" y="913" text-anchor="middle" class="tiny">Mesa</text>
  <rect x="1070" y="890" width="150" height="36" class="box"/>
  <text x="1145" y="913" text-anchor="middle" class="tiny">Comanda - LineaComanda</text>
  <rect x="800" y="960" width="150" height="36" class="box"/>
  <text x="875" y="983" text-anchor="middle" class="tiny">Plato - TarifaMenu</text>
  <rect x="970" y="960" width="160" height="36" class="box"/>
  <text x="1050" y="983" text-anchor="middle" class="tiny">Ticket - Reserva</text>
  <rect x="1148" y="960" width="120" height="36" class="box"/>
  <text x="1208" y="983" text-anchor="middle" class="tiny">LogAuditoria</text>

  <!-- MongoDB -->
  <rect x="1420" y="800" width="300" height="220" class="outer-gray"/>
  <text x="1570" y="833" text-anchor="middle" class="section-title">MongoDB Atlas</text>
  <rect x="1460" y="880" width="220" height="95" class="box"/>
  <text x="1570" y="913" text-anchor="middle" class="sub-title">Colecciones</text>
  <rect x="1485" y="935" width="70" height="28" class="box"/>
  <text x="1520" y="954" text-anchor="middle" class="tiny">users</text>
  <rect x="1565" y="935" width="70" height="28" class="box"/>
  <text x="1600" y="954" text-anchor="middle" class="tiny">mesas</text>
  <rect x="1645" y="935" width="70" height="28" class="box"/>
  <text x="1680" y="954" text-anchor="middle" class="tiny">tickets</text>

  <!-- Connections -->
  <path d="M 1400 620 C 1370 705, 1200 740, 1100 760" class="line-blue"/>
  <text x="1220" y="704" class="small">HTTP / HTTPS + JSON</text>

  <path d="M 1135 400 C 930 360, 820 335, 735 320" class="line"/>
  <text x="880" y="345" class="small">guarda offline</text>

  <path d="M 1040 250 C 1150 260, 1280 270, 1440 330" class="line"/>
  <text x="1160" y="248" class="small">notifica</text>

  <path d="M 500 292 C 720 345, 1020 300, 1135 430" class="line"/>
  <text x="725" y="355" class="small">emite</text>

  <path d="M 1532 465 C 1505 620, 1360 700, 1180 760" class="line-blue"/>
  <text x="1450" y="642" class="small">KDS actualizado</text>

  <path d="M 1570 800 C 1510 720, 1330 695, 1210 730" class="line-green"/>
  <text x="1378" y="706" class="small">CRUD</text>

  <path d="M 1330 895 C 1370 905, 1395 915, 1420 930" class="line-green"/>
  <text x="1328" y="880" class="small">Mongoose / TLS</text>

  <path d="M 735 880 C 765 890, 785 895, 800 900" class="line-green dash"/>
  <text x="738" y="865" class="small">persiste</text>

  <path d="M 590 825 C 500 735, 440 620, 535 500 C 620 395, 710 342, 720 320" class="line dash"/>
  <text x="510" y="665" class="small">sincroniza al recuperar red</text>

  <path d="M 1305 430 C 1040 520, 835 680, 700 825" class="line-blue"/>
  <text x="930" y="625" class="small">POST / GET / PUT</text>

  <path d="M 500 130 C 630 105, 750 96, 925 125 C 1180 170, 1400 230, 1530 325" class="line"/>
  <text x="940" y="138" class="small">eventos en tiempo real</text>
</svg>
